<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER.lab - Práctica de Diagramas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
      
      :root {
        --color-bg: #ffffff;
        --color-bg-sec: #f8faf9;
        --color-primary: #1D9E75;
        --color-text: #1a1a1a;
        --color-text-sec: #666;
        --color-border: #e0e0e0;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background-color: var(--color-bg); color: var(--color-text); }
      
      .app { font-family: 'Sora', sans-serif; padding: 1.5rem; max-width: 860px; margin: 0 auto; }
      
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border); }
      .logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--color-text); }
      .logo span { color: var(--color-primary); }
      .score-bar { display: flex; gap: 16px; align-items: center; }
      .score-pill { background: var(--color-bg-sec); border: 0.5px solid var(--color-border); border-radius: 20px; padding: 4px 14px; font-size: 13px; }
      
      .mode-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
      .tab { flex: 1; padding: 10px; border: 0.5px solid var(--color-border); border-radius: 8px; background: white; cursor: pointer; font-size: 13px; transition: all 0.15s; }
      .tab.active { background: var(--color-primary); border-color: var(--color-primary); color: white; font-weight: 500; }
      
      .problem-card { background: var(--color-bg-sec); border: 1px solid var(--color-border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
      .problem-label { font-size: 11px; font-weight: 700; color: var(--color-primary); text-transform: uppercase; margin-bottom: 8px; }
      .problem-text { font-size: 15px; line-height: 1.6; }
      
      .entities-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
      .entity-chip { padding: 10px 18px; border: 1.5px solid var(--color-border); border-radius: 8px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 14px; transition: all 0.2s; }
      .entity-chip.selected { background: #E1F5EE; border-color: var(--color-primary); }
      .entity-chip.correct { background: #d4edda; border-color: #28a745; }
      .entity-chip.wrong { background: #f8d7da; border-color: #dc3545; }
      
      .relation-row { display: grid; grid-template-columns: 1fr 120px 1fr; gap: 12px; align-items: center; margin-bottom: 12px; }
      .entity-box { background: var(--color-bg-sec); border: 1px solid var(--color-border); border-radius: 8px; padding: 12px; text-align: center; font-family: 'Space Mono', monospace; }
      .rel-select { padding: 10px; border-radius: 8px; border: 1.5px solid var(--color-border); width: 100%; cursor: pointer; }
      
      .attr-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
      .attr-chip { padding: 8px 16px; border: 1px solid var(--color-border); border-radius: 20px; cursor: pointer; font-size: 13px; }
      .attr-chip.sel-attr { background: #E1F5EE; border-color: var(--color-primary); }

      .actions { display: flex; gap: 12px; margin-top: 20px; }
      .btn-check { background: var(--color-primary); color: white; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-weight: 600; }
      .btn-next { background: #333; color: white; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; display: none; }
      
      .feedback { display: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
      .feedback.ok { background: #e7f3ef; border: 1px solid var(--color-primary); }
      .feedback.fail { background: #fdf2f2; border: 1px solid #dc3545; }

      .results-panel { text-align: center; padding: 40px 20px; display: none; }
      .btn-pdf { background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 14px 28px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">ER<span>.</span>lab</div>
    <div class="score-bar">
      <div class="score-pill">Puntos: <b id="score-display">0</b></div>
    </div>
  </div>
  
  <div id="main-interface">
    <div class="mode-tabs">
      <div class="tab active" id="tab-0">1. Entidades</div>
      <div class="tab" id="tab-1">2. Relaciones</div>
      <div class="tab" id="tab-2">3. Atributos</div>
    </div>

    <div id="game-area"></div>
  </div>

  <div id="results-area" class="results-panel">
    <h1 style="font-size: 48px; color: var(--color-primary);" id="final-pct">0%</h1>
    <p id="final-stats" style="margin-bottom: 20px;">Completaste todos los ejercicios.</p>
    <button class="btn-pdf" onclick="generatePDF()">Descargar PDF para Classroom</button>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

const EXERCISES = {
  0: [
    {
      text: "Se necesita un programa que administre los datos de las herramientas de un taller mecánico. Se deben registrar las herramientas, los mecánicos que las usan y las reparaciones realizadas.",
      pool: ["Herramienta","Mecánico","Reparación","Taller","Marca","Precio","Fecha","Cod_herramienta"],
      answer: ["Herramienta","Mecánico","Reparación"],
      explain: "Las entidades principales son Herramienta, Mecánico y Reparación. Marca y Precio son atributos."
    },
    {
      text: "Se necesita un programa que gestione las ventas de una librería. Se deben guardar los libros, los clientes que compran y los empleados que realizan la atención.",
      pool: ["Libro","Cliente","Empleado","Venta","Precio","Nombre","Dirección","Cod_libro"],
      answer: ["Libro","Cliente","Empleado","Venta"],
      explain: "Libro, Cliente, Empleado y Venta son las entidades que interactúan en el sistema."
    }
  ],
  1: [
    {
      pairs: [
        { a: "Cliente", b: "Factura", ans: "1-*", choices: ["1-1","1-*","*-1","*-*"] },
        { a: "Alumno", b: "Materia", ans: "*-*", choices: ["1-1","1-*","*-1","*-*"] },
        { a: "Persona", b: "Huella Digital", ans: "1-1", choices: ["1-1","1-*","*-1","*-*"] }
      ],
      explain: "Un cliente tiene muchas facturas (1-*). Un alumno cursa muchas materias y una materia tiene muchos alumnos (*-*). Una persona tiene una huella (1-1)."
    }
  ],
  2: [
    {
      entity: "Producto",
      allAttrs: ["cod_producto","nombre","precio","stock","cod_cliente","nombre_proveedor","descripcion"],
      answer: ["cod_producto","nombre","precio","stock","descripcion"],
      explain: "Los atributos propios son el código, nombre, precio, stock y descripción. Los demás son referencias a otras entidades."
    }
  ]
};

let currentMode = 0;
let currentEx = 0;
let score = 0;
let history = []; // Para el PDF
let selectedItems = new Set();
let relAnswers = {};

function render() {
  const container = document.getElementById('game-area');
  const ex = EXERCISES[currentMode][currentEx];
  
  if (!ex) {
    if (currentMode < 2) {
      currentMode++;
      currentEx = 0;
      updateTabs();
      render();
    } else {
      showFinalResults();
    }
    return;
  }

  if (currentMode === 0) renderEntities(container, ex);
  else if (currentMode === 1) renderRelations(container, ex);
  else renderAttributes(container, ex);
}

function updateTabs() {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', i === currentMode);
    });
}

function renderEntities(container, ex) {
  container.innerHTML = `
    <div class="problem-card">
      <div class="problem-label">Enunciado Técnico</div>
      <div class="problem-text">${ex.text}</div>
    </div>
    <div class="entities-grid">
      ${ex.pool.map(item => `<div class="entity-chip ${selectedItems.has(item)?'selected':''}" onclick="toggleSelect('${item}')">${item}</div>`).join('')}
    </div>
    <div class="actions">
        <button class="btn-check" id="check-btn" onclick="checkEntities()">Verificar</button>
        <button class="btn-next" id="next-btn" onclick="nextStep()">Siguiente</button>
    </div>
    <div id="feedback" class="feedback"></div>
  `;
}

function renderRelations(container, ex) {
  container.innerHTML = `
    <div class="problem-card">
      <div class="problem-label">Relaciones y Cardinalidad</div>
      <div class="problem-text">Indica la relación correcta entre estas entidades:</div>
    </div>
    ${ex.pairs.map((p, i) => `
      <div class="relation-row">
        <div class="entity-box">${p.a}</div>
        <select class="rel-select" id="rel-${i}" onchange="saveRel(${i}, this.value)">
          <option value="">?</option>
          ${p.choices.map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <div class="entity-box">${p.b}</div>
      </div>
    `).join('')}
    <div class="actions">
        <button class="btn-check" id="check-btn" onclick="checkRelations()">Verificar</button>
        <button class="btn-next" id="next-btn" onclick="nextStep()">Siguiente</button>
    </div>
    <div id="feedback" class="feedback"></div>
  `;
}

function renderAttributes(container, ex) {
  container.innerHTML = `
    <div class="problem-card">
      <div class="problem-label">Atributos de Entidad</div>
      <div class="problem-text">Selecciona los atributos que pertenecen a: <b>${ex.entity}</b></div>
    </div>
    <div class="attr-chips">
      ${ex.allAttrs.map(a => `<div class="attr-chip ${selectedItems.has(a)?'sel-attr':''}" onclick="toggleSelect('${a}')">${a}</div>`).join('')}
    </div>
    <div class="actions">
        <button class="btn-check" id="check-btn" onclick="checkAttributes()">Verificar</button>
        <button class="btn-next" id="next-btn" onclick="nextStep()">Finalizar</button>
    </div>
    <div id="feedback" class="feedback"></div>
  `;
}

function toggleSelect(item) {
    if (document.getElementById('next-btn').style.display === 'block') return;
    if (selectedItems.has(item)) selectedItems.delete(item);
    else selectedItems.add(item);
    render();
}

function saveRel(i, val) { relAnswers[i] = val; }

function checkEntities() {
    const ex = EXERCISES[0][currentEx];
    const isCorrect = ex.answer.every(a => selectedItems.has(a)) && selectedItems.size === ex.answer.size;
    processResult(isCorrect, ex.explain, `Entidades: ${[...selectedItems].join(', ')}`);
}

function checkRelations() {
    const ex = EXERCISES[1][currentEx];
    const isCorrect = ex.pairs.every((p, i) => relAnswers[i] === p.ans);
    processResult(isCorrect, ex.explain, "Cardinalidades");
}

function checkAttributes() {
    const ex = EXERCISES[2][currentEx];
    const isCorrect = ex.answer.every(a => selectedItems.has(a)) && selectedItems.size === ex.answer.size;
    processResult(isCorrect, ex.explain, `Atributos: ${[...selectedItems].join(', ')}`);
}

function processResult(correct, explain, userAns) {
    if (correct) score += 10;
    history.push({ mode: currentMode, correct, detail: userAns });
    
    const fb = document.getElementById('feedback');
    fb.style.display = 'block';
    fb.className = 'feedback ' + (correct ? 'ok' : 'fail');
    fb.innerHTML = `<b>${correct ? '¡Excelente!' : 'Para revisar:'}</b> ${explain}`;
    
    document.getElementById('check-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('score-display').innerText = score;
}

function nextStep() {
    selectedItems = new Set();
    relAnswers = {};
    currentEx++;
    render();
}

function showFinalResults() {
    document.getElementById('main-interface').style.display = 'none';
    document.getElementById('results-area').style.display = 'block';
    const totalPosible = (history.length) * 10;
    const pct = Math.round((score / totalPosible) * 100);
    document.getElementById('final-pct').innerText = pct + "%";
}

function generatePDF() {
    const doc = new jsPDF();
    const fecha = new Date().toLocaleString();
    
    doc.setFontSize(20);
    doc.setTextColor(29, 158, 117);
    doc.text("Informe de Práctica ER.lab", 20, 20);
    
    doc.setFontSize(12);
    doc.setTextColor(100);
    doc.text(`Fecha: ${fecha}`, 20, 30);
    doc.text(`Puntaje Total: ${score} puntos`, 20, 38);
    
    doc.setDrawColor(200);
    doc.line(20, 45, 190, 45);
    
    let y = 55;
    history.forEach((entry, i) => {
        const modNames = ["Identificación de Entidades", "Relaciones (Cardinalidad)", "Atributos"];
        doc.setTextColor(0);
        doc.setFont(undefined, 'bold');
        doc.text(`${i+1}. ${modNames[entry.mode]}`, 20, y);
        y += 7;
        doc.setFont(undefined, 'normal');
        doc.setTextColor(entry.correct ? 30 : 150, entry.correct ? 120 : 30, 30);
        doc.text(`Resultado: ${entry.correct ? 'CORRECTO' : 'INCORRECTO'}`, 20, y);
        y += 7;
        doc.setTextColor(80);
        doc.text(`Tu respuesta: ${entry.detail}`, 20, y);
        y += 15;
        
        if (y > 270) { doc.addPage(); y = 20; }
    });
    
    doc.save("Entrega_BaseDeDatos.pdf");
}

render();
</script>

</body>
</html>
