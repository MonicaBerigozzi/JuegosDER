
<style>

  .stat-l { font-size: 12px; color: var(--color-text-secondary); }
  .copy-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 10px 20px; font-family: 'Sora', sans-serif; font-size: 14px; cursor: pointer; margin-right: 8px; color: var(--color-text-primary); }
  .restart-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'Sora', sans-serif; font-size: 14px; cursor: pointer; }

<div class="app">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Práctica de diagramas entidad-relación</h2>
  
  <div class="header">
    <div class="logo">ER<span>.</span>lab</div>
    <div class="score-bar">
      <div class="score-pill">Ejercicio <b id="q-num">1</b> de <b id="q-total">9</b></div>
      <div class="score-pill">Puntos: <b id="score-display">0</b></div>
    </div>
  </div>
  
  <div class="mode-tabs">
    <button class="tab active" onclick="switchMode(0)"><span class="tab-icon">🎯</span>Entidades</button>
    <button class="tab" onclick="switchMode(1)"><span class="tab-icon">🔗</span>Relaciones</button>
    <button class="tab" onclick="switchMode(2)"><span class="tab-icon">📋</span>Atributos</button>
  </div>
  
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:11%"></div></div>
  
  <div id="game-area"></div>
  <div id="results-area" class="results-panel"></div>
</div>

<script>
const EXERCISES = {
  0: [
    {
      text: "Una biblioteca necesita gestionar sus libros, los socios que los toman prestados, y los autores que los escriben. También se registran las sucursales donde se devuelven.",
      pool: ["Libro","Socio","Autor","Sucursal","Teléfono","Color","Préstamo","Dirección","Precio"],
      answer: ["Libro","Socio","Autor","Sucursal"],
      explain: "Las entidades son los objetos principales del dominio con existencia propia: Libro, Socio, Autor y Sucursal. Teléfono y Dirección son atributos, no entidades."
    },
    {
      text: "Un hospital registra los médicos que atienden pacientes, las especialidades de cada médico, y los turnos que se asignan. Los insumos médicos se asocian a cada internación.",
      pool: ["Médico","Paciente","Especialidad","Turno","Insumo","Historia clínica","Nombre","Fecha","Sala"],
      answer: ["Médico","Paciente","Especialidad","Turno","Insumo"],
      explain: "Médico, Paciente, Especialidad, Turno e Insumo son entidades. Historia clínica podría serlo según el diseño, pero Nombre y Fecha son atributos típicos."
    },
    {
      text: "Una tienda online maneja productos que pertenecen a categorías. Los clientes hacen pedidos y cada pedido puede incluir varios productos. Los vendedores gestionan los pedidos.",
      pool: ["Producto","Categoría","Cliente","Pedido","Vendedor","Precio","Descripción","Cantidad","Foto"],
      answer: ["Producto","Categoría","Cliente","Pedido","Vendedor"],
      explain: "Las cinco entidades son las que tienen identidad propia en el sistema. Precio, Descripción, Cantidad y Foto son atributos de las entidades."
    }
  ],
  1: [
    {
      pairs: [
        { a: "Estudiante", b: "Curso", ans: "N:M", choices: ["1:1","1:N","N:M"] },
        { a: "Empleado", b: "Departamento", ans: "N:1", choices: ["1:1","N:1","N:M"] },
        { a: "Persona", b: "DNI", ans: "1:1", choices: ["1:1","1:N","N:M"] }
      ],
      explain: "Un estudiante puede inscribirse en muchos cursos y un curso puede tener muchos estudiantes (N:M). Un empleado trabaja en un departamento pero un departamento tiene muchos empleados (N:1). Una persona tiene un único DNI y cada DNI corresponde a una persona (1:1)."
    },
    {
      pairs: [
        { a: "Médico", b: "Paciente", ans: "N:M", choices: ["1:1","1:N","N:M"] },
        { a: "Pedido", b: "Producto", ans: "N:M", choices: ["1:N","N:M","1:1"] },
        { a: "País", b: "Capital", ans: "1:1", choices: ["1:1","1:N","N:M"] }
      ],
      explain: "Un médico atiende a muchos pacientes y un paciente puede ser atendido por muchos médicos (N:M). Un pedido tiene muchos productos y un producto puede estar en muchos pedidos (N:M). Un país tiene una capital y cada capital pertenece a un país (1:1)."
    },
    {
      pairs: [
        { a: "Autor", b: "Libro", ans: "N:M", choices: ["1:1","1:N","N:M"] },
        { a: "Factura", b: "Cliente", ans: "N:1", choices: ["1:1","N:1","N:M"] },
        { a: "Vuelo", b: "Avión", ans: "N:1", choices: ["N:1","1:N","N:M"] }
      ],
      explain: "Un autor puede escribir muchos libros y un libro puede tener varios autores (N:M). Muchas facturas pertenecen a un cliente (N:1). Muchos vuelos pueden usar el mismo avión pero un vuelo usa un avión específico (N:1)."
    }
  ],
  2: [
    {
      entity: "Cliente",
      allAttrs: ["id_cliente","nombre","apellido","email","precio_venta","stock","fecha_alta","teléfono","descuento_proveedor","dirección"],
      answer: ["id_cliente","nombre","apellido","email","fecha_alta","teléfono","dirección"],
      explain: "Los atributos de Cliente son sus datos personales y de contacto. Precio_venta y stock son atributos de Producto. Descuento_proveedor pertenece a una relación con Proveedor."
    },
    {
      entity: "Producto",
      allAttrs: ["id_producto","nombre","precio","stock","email_cliente","descripción","categoría","fecha_alta_socio","código_barras","teléfono"],
      answer: ["id_producto","nombre","precio","stock","descripción","código_barras"],
      explain: "Los atributos de Producto son sus características físicas y comerciales. Email_cliente y teléfono son de Cliente. Fecha_alta_socio pertenece a Socio. Categoría es más bien una entidad relacionada."
    },
    {
      entity: "Turno médico",
      allAttrs: ["id_turno","fecha","hora","estado","nombre_médico","especialidad_turno","motivo_consulta","DNI_paciente","número_sala","precio"],
      answer: ["id_turno","fecha","hora","estado","especialidad_turno","motivo_consulta"],
      explain: "El turno tiene atributos propios: identificador, cuándo es, estado y el motivo. Nombre_médico y DNI_paciente son claves foráneas (referencias a otras entidades). Número_sala podría ser de Sala como entidad propia."
    }
  ]
};

let mode = 0;
let qIdx = [0,0,0];
let score = 0;
let total = 0;
let correct = 0;
let checked = false;
let selectedEntities = new Set();
let selectedRelations = {};
let selectedAttrs = new Set();
let finished = [false,false,false];

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===m));
  checked = false;
  selectedEntities = new Set();
  selectedRelations = {};
  selectedAttrs = new Set();
  render();
}

function totalExercises() {
  return EXERCISES[0].length + EXERCISES[1].length + EXERCISES[2].length;
}

function doneCount() {
  return qIdx[0] + qIdx[1] + qIdx[2];
}

function render() {
  const gameArea = document.getElementById('game-area');
  const resultsArea = document.getElementById('results-area');
  const allDone = qIdx[0] >= EXERCISES[0].length && qIdx[1] >= EXERCISES[1].length && qIdx[2] >= EXERCISES[2].length;
  
  if(allDone && finished[0] && finished[1] && finished[2]) {
    gameArea.style.display = 'none';
    resultsArea.style.display = 'block';
    renderResults();
    return;
  }
  
  gameArea.style.display = 'block';
  resultsArea.style.display = 'none';
  
  const done = doneCount();
  const tot = totalExercises();
  document.getElementById('q-num').textContent = done + 1;
  document.getElementById('q-total').textContent = tot;
  document.getElementById('score-display').textContent = score;
  document.getElementById('prog-bar').style.width = Math.round((done/tot)*100)+'%';
  
  if(mode === 0) renderEntities(gameArea);
  else if(mode === 1) renderRelations(gameArea);
  else renderAttribs(gameArea);
}

function renderEntities(container) {
  const ex = EXERCISES[0][qIdx[0]];
  if(!ex) { container.innerHTML = '<p style="color:var(--color-text-secondary);padding:2rem 0">Completaste todos los ejercicios de esta sección</p>'; return; }
  let html = `
    <div class="problem-card">
      <div class="problem-label">Enunciado</div>
      <div class="problem-text">${ex.text}</div>
    </div>
    <p class="instruction">Seleccioná las entidades principales del problema:</p>
    <div class="entities-grid" id="ent-grid">`;
  ex.pool.forEach(e => {
    let cls = 'entity-chip';
    if(checked) {
      if(ex.answer.includes(e) && selectedEntities.has(e)) cls += ' correct';
      else if(!ex.answer.includes(e) && selectedEntities.has(e)) cls += ' wrong';
      else if(ex.answer.includes(e) && !selectedEntities.has(e)) cls += ' missed';
    } else if(selectedEntities.has(e)) cls += ' selected';
    html += `<div class="${cls}" onclick="toggleEntity('${e}')">${e}</div>`;
  });
  html += `</div>
    <div class="actions">
      <button class="btn-check" onclick="checkEntities()">Verificar</button>
      <button class="btn-next" id="btn-next" onclick="nextExercise()">Siguiente →</button>
    </div>
    <div class="feedback" id="feedback"></div>`;
  container.innerHTML = html;
  if(checked) showEntityFeedback(ex);
}

function toggleEntity(e) {
  if(checked) return;
  if(selectedEntities.has(e)) selectedEntities.delete(e);
  else selectedEntities.add(e);
  render();
}

function checkEntities() {
  if(checked) return;
  checked = true;
  const ex = EXERCISES[0][qIdx[0]];
  const right = ex.answer.every(a => selectedEntities.has(a)) && [...selectedEntities].every(s => ex.answer.includes(s));
  if(right) { score += 10; correct++; }
  total++;
  render();
}

function showEntityFeedback(ex) {
  const fb = document.getElementById('feedback');
  const right = ex.answer.every(a => selectedEntities.has(a)) && [...selectedEntities].every(s => ex.answer.includes(s));
  fb.style.display = 'block';
  fb.className = 'feedback ' + (right ? 'ok' : 'fail');
  fb.innerHTML = (right ? '✓ Correcto. ' : '✗ No del todo. ') + ex.explain;
  document.getElementById('btn-next').style.display = 'block';
}

function renderRelations(container) {
  const ex = EXERCISES[1][qIdx[1]];
  if(!ex) { container.innerHTML = '<p style="color:var(--color-text-secondary);padding:2rem 0">Completaste todos los ejercicios de esta sección</p>'; return; }
  let html = `
    <div class="problem-card">
      <div class="problem-label">Cardinalidad</div>
      <div class="problem-text">Elegí la cardinalidad correcta para cada relación:</div>
    </div>
    <div class="relation-area">`;
  ex.pairs.forEach((p,i) => {
    let selCls = '';
    if(checked) {
      selCls = selectedRelations[i] === p.ans ? 'correct-sel' : 'wrong-sel';
    }
    html += `<div class="relation-row">
      <div class="entity-box">${p.a}</div>
      <select class="rel-select ${selCls}" onchange="setRelation(${i}, this.value)" ${checked?'disabled':''}>
        <option value="">—</option>
        ${p.choices.map(c => `<option value="${c}" ${selectedRelations[i]===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <div class="entity-box">${p.b}</div>
    </div>`;
  });
  html += `</div>
    <div class="actions">
      <button class="btn-check" onclick="checkRelations()">Verificar</button>
      <button class="btn-next" id="btn-next" onclick="nextExercise()">Siguiente →</button>
    </div>
    <div class="feedback" id="feedback"></div>`;
  container.innerHTML = html;
  if(checked) showRelationFeedback(ex);
}

function setRelation(i, v) { selectedRelations[i] = v; }

function checkRelations() {
  if(checked) return;
  checked = true;
  const ex = EXERCISES[1][qIdx[1]];
  let allRight = ex.pairs.every((p,i) => selectedRelations[i] === p.ans);
  if(allRight) { score += 10; correct++; }
  total++;
  render();
}

function showRelationFeedback(ex) {
  const fb = document.getElementById('feedback');
  const allRight = ex.pairs.every((p,i) => selectedRelations[i] === p.ans);
  fb.style.display = 'block';
  fb.className = 'feedback ' + (allRight ? 'ok' : 'fail');
  fb.innerHTML = (allRight ? '✓ Correcto. ' : '✗ Revisá las cardinalidades. ') + ex.explain;
  document.getElementById('btn-next').style.display = 'block';
}

function renderAttribs(container) {
  const ex = EXERCISES[2][qIdx[2]];
  if(!ex) { container.innerHTML = '<p style="color:var(--color-text-secondary);padding:2rem 0">Completaste todos los ejercicios de esta sección</p>'; return; }
  let html = `
    <div class="problem-card">
      <div class="problem-label">Atributos</div>
      <div class="problem-text">Seleccioná los atributos que corresponden a la entidad <b>${ex.entity}</b>:</div>
    </div>
    <div class="attr-section">
      <div class="entity-header"><span>${ex.entity}</span><span class="entity-badge">entidad</span></div>
      <div class="attr-chips">`;
  ex.allAttrs.forEach(a => {
    let cls = 'attr-chip';
    if(checked) {
      if(ex.answer.includes(a) && selectedAttrs.has(a)) cls += ' correct-attr';
      else if(!ex.answer.includes(a) && selectedAttrs.has(a)) cls += ' wrong-attr';
      else if(ex.answer.includes(a) && !selectedAttrs.has(a)) cls += ' missed';
    } else if(selectedAttrs.has(a)) cls += ' sel-attr';
    html += `<div class="${cls}" onclick="toggleAttr('${a}')">${a}</div>`;
  });
  html += `</div></div>
    <div class="actions">
      <button class="btn-check" onclick="checkAttribs()">Verificar</button>
      <button class="btn-next" id="btn-next" onclick="nextExercise()">Siguiente →</button>
    </div>
    <div class="feedback" id="feedback"></div>`;
  container.innerHTML = html;
  if(checked) showAttribFeedback(ex);
}

function toggleAttr(a) {
  if(checked) return;
  if(selectedAttrs.has(a)) selectedAttrs.delete(a);
  else selectedAttrs.add(a);
  render();
}

function checkAttribs() {
  if(checked) return;
  checked = true;
  const ex = EXERCISES[2][qIdx[2]];
  const right = ex.answer.every(a => selectedAttrs.has(a)) && [...selectedAttrs].every(s => ex.answer.includes(s));
  if(right) { score += 10; correct++; }
  total++;
  render();
}

function showAttribFeedback(ex) {
  const fb = document.getElementById('feedback');
  const right = ex.answer.every(a => selectedAttrs.has(a)) && [...selectedAttrs].every(s => ex.answer.includes(s));
  fb.style.display = 'block';
  fb.className = 'feedback ' + (right ? 'ok' : 'fail');
  fb.innerHTML = (right ? '✓ Correcto. ' : '✗ Algunos no pertenecen. ') + ex.explain;
  document.getElementById('btn-next').style.display = 'block';
}

function nextExercise() {
  checked = false;
  selectedEntities = new Set();
  selectedRelations = {};
  selectedAttrs = new Set();
  
  if(mode === 0) {
    qIdx[0]++;
    if(qIdx[0] >= EXERCISES[0].length) finished[0] = true;
  } else if(mode === 1) {
    qIdx[1]++;
    if(qIdx[1] >= EXERCISES[1].length) finished[1] = true;
  } else {
    qIdx[2]++;
    if(qIdx[2] >= EXERCISES[2].length) finished[2] = true;
  }
  
  if(finished[0] && finished[1] && finished[2]) {
    renderFinalResults();
  } else {
    if(mode === 0 && finished[0]) switchMode(1);
    else if(mode === 1 && finished[1]) switchMode(2);
    else render();
  }
}

function renderFinalResults() {
  document.getElementById('game-area').style.display = 'none';
  const ra = document.getElementById('results-area');
  ra.style.display = 'block';
  const pct = Math.round((correct/total)*100);
  const now = new Date();
  const ts = now.toLocaleDateString('es-AR') + ' ' + now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  ra.innerHTML = `
    <div class="results-score">${pct}%</div>
    <div class="results-label">Ejercicios correctos: ${correct} de ${total}</div>
    <div class="results-detail">
      <div class="stat-box"><div class="stat-n">${score}</div><div class="stat-l">puntos totales</div></div>
      <div class="stat-box"><div class="stat-n">${correct}</div><div class="stat-l">respuestas correctas</div></div>
      <div class="stat-box"><div class="stat-n">${total-correct}</div><div class="stat-l">para repasar</div></div>
    </div>
    <div style="margin-bottom:1rem">
      <button class="copy-btn" onclick="copyReport('${ts}','${pct}','${score}','${correct}','${total}')">Copiar informe para Classroom</button>
      <button class="restart-btn" onclick="restart()">Reiniciar</button>
    </div>
    <div class="classroom-note">Para enviar a Google Classroom: copiá el informe y pegalo como entrega en la actividad asignada por tu docente.</div>
  `;
}

function copyReport(ts, pct, sc, corr, tot) {
  const txt = `=== Informe ER.lab ===\nFecha: ${ts}\nEjercicios correctos: ${corr}/${tot}\nPorcentaje: ${pct}%\nPuntos: ${sc}\n\nSecciones:\n- Identificación de entidades\n- Cardinalidad de relaciones\n- Atributos de entidades`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar informe para Classroom', 2000);
  });
}

function restart() {
  mode = 0; qIdx = [0,0,0]; score = 0; total = 0; correct = 0;
  checked = false; selectedEntities = new Set(); selectedRelations = {}; selectedAttrs = new Set();
  finished = [false,false,false];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  render();
}

render();
</script>
