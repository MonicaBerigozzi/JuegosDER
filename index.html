<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER.lab - Práctica de Diagramas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
    
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8faf9;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666;
      --color-border-primary: #1D9E75;
      --color-border-secondary: #e0e0e0;
      --color-border-tertiary: #eee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--color-background-primary); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    
    .app { font-family: 'Sora', sans-serif; padding: 1.5rem; max-width: 860px; margin: 0 auto; }
    
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .logo { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--color-text-primary); letter-spacing: -0.5px; }
    .logo span { color: #1D9E75; }
    
    .score-bar { display: flex; gap: 16px; align-items: center; }
    .score-pill { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; padding: 4px 14px; font-size: 13px; color: var(--color-text-secondary); }
    .score-pill b { color: var(--color-text-primary); }
    
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 10px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; background: var(--color-background-primary); cursor: pointer; font-size: 13px; font-family: 'Sora', sans-serif; color: var(--color-text-secondary); text-align: center; transition: all 0.15s; }
    .tab.active { background: #1D9E75; border-color: #1D9E75; color: white; font-weight: 500; }
    
    .problem-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
    .problem-label { font-size: 11px; font-weight: 500; color: #0F6E56; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .problem-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; }
    
    .entities-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
    .entity-chip { padding: 8px 16px; border: 1.5px solid var(--color-border-secondary); border-radius: 8px; background: var(--color-background-primary); cursor: pointer; font-size: 14px; font-family: 'Space Mono', monospace; color: var(--color-text-primary); transition: all 0.15s; }
    .entity-chip:hover { border-color: #1D9E75; }
    .entity-chip.selected { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
    .entity-chip.correct { background: #E1F5EE; border-color: #0F6E56; color: #085041; }
    .entity-chip.wrong { background: #FAECE7; border-color: #993C1D; color: #4A1B0C; }
    .entity-chip.missed { border: 2px dashed #0F6E56; color: #0F6E56; }

    .relation-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 12px; }
    .entity-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 10px 14px; text-align: center; font-family: 'Space Mono', monospace; font-size: 13px; color: var(--color-text-primary); }
    .rel-select { padding: 8px 12px; border: 1.5px solid var(--color-border-secondary); border-radius: 8px; background: var(--color-background-primary); font-family: 'Sora', sans-serif; font-size: 13px; color: var(--color-text-primary); cursor: pointer; outline: none; }
    .rel-select:focus { border-color: #1D9E75; }
    .rel-select.correct { background: #E1F5EE; border-color: #0F6E56; }
    .rel-select.wrong { background: #FAECE7; border-color: #993C1D; }

    .attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
    .attr-chip { padding: 8px 14px; border: 1px solid var(--color-border-secondary); border-radius: 20px; background: var(--color-background-primary); cursor: pointer; font-size: 13px; color: var(--color-text-secondary); transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .attr-chip.selected { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
    .attr-chip.correct { background: #E1F5EE; border-color: #0F6E56; }
    .attr-chip.wrong { background: #FAECE7; border-color: #993C1D; }

    .actions { display: flex; gap: 12px; margin-top: 1.5rem; }
    .btn-check { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 11px 24px; cursor: pointer; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 500; transition: background 0.15s; }
    .btn-check:hover { background: #168a65; }
    .btn-next { background: #333; color: white; border: none; border-radius: 8px; padding: 11px 24px; cursor: pointer; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 500; display: none; }
    
    .feedback { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; line-height: 1.5; }
    .feedback.ok { background: #E1F5EE; color: #085041; border: 0.5px solid #5DCAA5; }
    .feedback.fail { background: #FAECE7; color: #4A1B0C; border: 0.5px solid #F0997B; }

    .results-panel { display: none; text-align: center; padding: 2rem 1rem; }
    .final-score { font-family: 'Space Mono', monospace; font-size: 48px; font-weight: 700; color: #1D9E75; margin-bottom: 0.5rem; }
    .pdf-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 14px 28px; cursor: pointer; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 15px; margin-top: 20px; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">ER<span>.</span>lab</div>
    <div class="score-bar">
      <div class="score-pill">Ejercicio <b id="q-count">1</b>/9</div>
      <div class="score-pill">Puntos: <b id="score-display">0</b></div>
    </div>
  </div>

  <div id="game-ui">
    <div class="mode-tabs">
      <div class="tab active" id="tab-0">Entidades</div>
      <div class="tab" id="tab-1">Relaciones</div>
      <div class="tab" id="tab-2">Atributos</div>
    </div>
    <div id="exercise-container"></div>
  </div>

  <div id="results-ui" class="results-panel">
    <div class="final-score" id="pct-display">0%</div>
    <p id="stats-display" style="color: #666;"></p>
    <button class="pdf-btn" onclick="generatePDF()">Descargar PDF para Classroom</button>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

const DATA = {
  0: [
    { text: "Se necesita un programa que administre los datos de una biblioteca, considerando las sucursales de la misma.", pool: ["Libro","Socio","Autor","Sucursal","Teléfono","Color","Préstamo","Dirección"], answer: ["Libro","Socio","Autor","Sucursal"], explain: "Las entidades son los conceptos con identidad propia: Libro, Socio, Autor y Sucursal." },
    { text: "Se necesita un programa que administe los turnos de un centro médico, incluyendo los insumos médicos se asocian a cada internación.", pool: ["Médico","Paciente","Especialidad","Turno","Insumo","Historia clínica","Nombre","Fecha"], answer: ["Médico","Paciente","Especialidad","Turno","Insumo"], explain: "Médico, Paciente, Especialidad, Turno e Insumo son las entidades principales." },
    { text: "Se necesita un programa que maneje una tienda online: productos que pertenecen a categorías. Los clientes hacen pedidos y los vendedores gestionan los mismos.", pool: ["Producto","Categoría","Cliente","Pedido","Vendedor","Precio","Descripción","Cantidad"], answer: ["Producto","Categoría","Cliente","Pedido","Vendedor"], explain: "Producto, Categoría, Cliente, Pedido y Vendedor son entidades." }
  ],
  1: [
    { pairs: [{ a: "Estudiante", b: "Curso", ans: "*-*", choices: ["1-1","1-*","*-1","*-*"] }, { a: "Empleado", b: "Departamento", ans: "*-1", choices: ["1-1","1-*","*-1","*-*"] }, { a: "Persona", b: "DNI", ans: "1-1", choices: ["1-1","1-*","*-1","*-*"] }], explain: "Estudiante-Curso es *-*, Empleado-Dpto es *-1 y Persona-DNI es 1-1." },
    { pairs: [{ a: "Médico", b: "Paciente", ans: "*-*", choices: ["1-1","1-*","*-1","*-*"] }, { a: "Pedido", b: "Producto", ans: "*-*", choices: ["1-1","1-*","*-1","*-*"] }, { a: "País", b: "Capital", ans: "1-1", choices: ["1-1","1-*","*-1","*-*"] }], explain: "Médico-Paciente es *-*, Pedido-Producto es *-* y País-Capital es 1-1." },
    { pairs: [{ a: "Autor", b: "Libro", ans: "*-*", choices: ["1-1","1-*","*-1","*-*"] }, { a: "Factura", b: "Cliente", ans: "*-1", choices: ["1-1","1-*","*-1","*-*"] }, { a: "Vuelo", b: "Avión", ans: "*-1", choices: ["1-1","1-*","*-1","*-*"] }], explain: "Autor-Libro es *-*, Factura-Cliente es *-1 y Vuelo-Avión es *-1." }
  ],
  2: [
    { entity: "Cliente", pool: ["cod_cliente","nombre","apellido","email","precio_venta","stock","fecha_alta","teléfono"], answer: ["cod_cliente","nombre","apellido","email","fecha_alta","teléfono"], explain: "Atributos propios de Cliente: cod, nombre, apellido, email, fecha y tel." },
    { entity: "Producto", pool: ["cod_producto","nombre","precio","stock","email_cliente","descripción","código_barras"], answer: ["cod_producto","nombre","precio","stock","descripción","código_barras"], explain: "Atributos de Producto: cod, nombre, precio, stock, descripción y barras." },
    { entity: "Turno médico", pool: ["cod_turno","fecha","hora","estado","cod_médico","especialidad_turno","motivo","DNI_paciente"], answer: ["cod_turno","fecha","hora","estado","especialidad_turno","motivo"], explain: "Atributos del turno: cod, fecha, hora, estado, especialidad y motivo." }
  ]
};

let mode = 0, qIdx = 0, score = 0, checked = false;
let selected = new Set(), rels = {}, report = [];

function init() {
  const container = document.getElementById('exercise-container');
  const ex = DATA[mode][qIdx];
  document.getElementById('q-count').innerText = (mode * 3) + qIdx + 1;
  document.getElementById('score-display').innerText = score;

  if (mode === 0) {
    container.innerHTML = `
      <div class="problem-card"><div class="problem-label">Enunciado</div><div class="problem-text">${ex.text}</div></div>
      <div class="entities-grid">${ex.pool.map(e => `<div class="entity-chip ${getClass(e, ex.answer)}" onclick="toggle('${e}')">${e}</div>`).join('')}</div>`;
  } else if (mode === 1) {
    container.innerHTML = `
      <div class="problem-card"><div class="problem-label">Relaciones</div><div class="problem-text">Seleccioná la cardinalidad adecuada:</div></div>
      ${ex.pairs.map((p, i) => `
        <div class="relation-row">
          <div class="entity-box">${p.a}</div>
          <select class="rel-select ${getRelClass(i, p.ans)}" onchange="rels[${i}]=this.value" ${checked?'disabled':''}>
            <option value="">—</option>
            ${p.choices.map(c => `<option value="${c}" ${rels[i]===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <div class="entity-box">${p.b}</div>
        </div>`).join('')}`;
  } else {
    container.innerHTML = `
      <div class="problem-card"><div class="problem-label">Atributos</div><div class="problem-text">Seleccioná los atributos de la entidad <b>${ex.entity}</b>:</div></div>
      <div class="entities-grid">${ex.pool.map(a => `<div class="entity-chip ${getClass(a, ex.answer)}" onclick="toggle('${a}')">${a}</div>`).join('')}</div>`;
  }
  container.innerHTML += `
    <div class="actions"><button class="btn-check" id="btn-c" onclick="verify()">Verificar</button><button class="btn-next" id="btn-n" onclick="next()">Siguiente →</button></div>
    <div id="fb" class="feedback"></div>`;
}

function getClass(item, ans) {
  if (!checked) return selected.has(item) ? 'selected' : '';
  if (ans.includes(item) && selected.has(item)) return 'correct';
  if (!ans.includes(item) && selected.has(item)) return 'wrong';
  if (ans.includes(item) && !selected.has(item)) return 'missed';
  return '';
}

function getRelClass(i, ans) {
  if (!checked) return '';
  return rels[i] === ans ? 'correct' : 'wrong';
}

function toggle(item) { if(!checked) { selected.has(item) ? selected.delete(item) : selected.add(item); init(); } }

function verify() {
  const ex = DATA[mode][qIdx];
  let ok = false;
  let userAns = "", correctAns = "";

  if (mode === 0 || mode === 2) {
    ok = ex.answer.every(a => selected.has(a)) && selected.size === ex.answer.length;
    userAns = [...selected].join(', ') || "Ninguna";
    correctAns = ex.answer.join(', ');
  } else {
    ok = ex.pairs.every((p, i) => rels[i] === p.ans);
    userAns = ex.pairs.map((p,i) => `${p.a}-${p.b}: ${rels[i]||'?'}`).join(' | ');
    correctAns = ex.pairs.map(p => `${p.a}-${p.b}: ${p.ans}`).join(' | ');
  }

  checked = true;
  if(ok) score += 10;
  report.push({ n: (mode*3)+qIdx+1, ok, u: userAns, c: correctAns, e: ex.explain });
  
  const fb = document.getElementById('fb');
  fb.innerHTML = `<b>${ok ? '✓ ¡Excelente!' : '✗ Revisalo'}</b><br>${ex.explain}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'fail');
  fb.style.display = 'block';
  document.getElementById('btn-c').style.display = 'none';
  document.getElementById('btn-n').style.display = 'block';
  init();
}

function next() {
  checked = false; selected.clear(); rels = {}; qIdx++;
  if(qIdx > 2) { qIdx = 0; mode++; if(mode > 2) return finish(); updateTabs(); }
  init();
}

function updateTabs() { [0,1,2].forEach(i => document.getElementById('tab-'+i).className = 'tab' + (i===mode?' active':'')); }

function finish() {
  document.getElementById('game-ui').style.display = 'none';
  document.getElementById('results-ui').style.display = 'block';
  const pct = Math.round((score/90)*100);
  document.getElementById('pct-display').innerText = pct + "%";
  document.getElementById('stats-display').innerText = `Completaste la práctica con ${score} puntos de 90 posibles.`;
}

function generatePDF() {
  const doc = new jsPDF();
  doc.setFontSize(18); doc.text("Informe de Práctica: ER.lab", 20, 20);
  doc.setFontSize(11); doc.text(`Fecha: ${new Date().toLocaleDateString()} | Puntos: ${score}/90`, 20, 30);
  let y = 45;
  report.forEach(r => {
    if(y > 270) { doc.addPage(); y = 20; }
    doc.setFont(undefined, 'bold'); doc.text(`Ejercicio ${r.n} [${r.ok?'CORRECTO':'INCORRECTO'}]`, 20, y); y+=6;
    doc.setFont(undefined, 'normal');
    doc.text(doc.splitTextToSize("Tu respuesta: " + r.u, 170), 20, y); y+=8;
    doc.setTextColor(29, 158, 117); doc.text(doc.splitTextToSize("Correcto: " + r.c, 170), 20, y); y+=8;
    doc.setTextColor(100); doc.text(doc.splitTextToSize("Nota: " + r.e, 170), 20, y);
    doc.setTextColor(0); y+=15;
  });
  doc.save("Entrega_ERlab.pdf");
}

init();
</script>
</body>
</html>
